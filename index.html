<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Stadium Duel</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Press+Start+2P&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --pk-blue: #3b4cca; --pk-red: #ff0000; }
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #000;
            color: white;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }
        .pixel-font { font-family: 'Press Start 2P', cursive; }

        /* Background from Wallpapers.com/pokemon-stadium */
        .stadium-bg {
            background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), 
                            url('https://wallpapers.com/images/featured/pokemon-stadium-v0m509939q3vclq7.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        .split-screen { display: grid; grid-template-columns: 1fr 1fr; height: 100vh; width: 100vw; }
        .team-panel { display: flex; flex-direction: column; justify-content: space-between; padding: 2rem; transition: background 0.3s ease; }
        .team-1 { border-right: 6px solid rgba(0,0,0,0.5); background: rgba(59, 76, 202, 0.25); }
        .team-2 { background: rgba(255, 0, 0, 0.25); }

        .hp-container { width: 100%; height: 24px; background: #333; border: 4px solid #000; border-radius: 12px; overflow: hidden; }
        .hp-fill { height: 100%; width: 100%; background: #4ade80; transition: width 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); }

        .combat-btn {
            width: 100%; padding: 2.5rem 1rem; border-radius: 24px; border: 6px solid rgba(255,255,255,0.3);
            font-weight: 900; text-transform: uppercase; font-size: 1.8rem; box-shadow: 0 10px 0 rgba(0,0,0,0.4); transition: all 0.1s;
        }
        .combat-btn:active { transform: translateY(6px); box-shadow: none; }
        .t1-color { background: linear-gradient(145deg, #3b4cca, #2a3891); }
        .t2-color { background: linear-gradient(145deg, #ff0000, #b30000); }

        #level-up-screen { background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .nav-pill { background: white; color: #000; padding: 12px 30px; border-radius: 50px; font-size: 0.85rem; font-weight: 900; cursor: pointer; z-index: 200; }
        .sprite-opt { cursor: pointer; transition: 0.2s; border: 5px solid transparent; border-radius: 20px; width: 80px; height: 80px; object-fit: contain; }
        .selected-sprite { border-color: #ffde00; background: rgba(255,222,0,0.3); }

        .global-score-bar { position: fixed; top: 60px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; z-index: 100; }
        .score-pill { background: rgba(0, 0, 0, 0.8); border: 2px solid white; padding: 8px 20px; border-radius: 10px; display: flex; align-items: center; gap: 10px; }
        .score-val { color: #ffde00; font-weight: 900; font-size: 1.2rem; }
    </style>
</head>
<body class="stadium-bg">

    <div class="fixed top-6 left-1/2 -translate-x-1/2 flex gap-6 z-[200]">
        <div class="nav-pill pixel-font" onclick="location.reload()">HOME</div>
    </div>

    <div id="screen-menu" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-slate-950/90 overflow-y-auto p-10">
        <h1 class="pixel-font text-5xl text-yellow-400 mb-10 text-center drop-shadow-[0_6px_0_rgba(0,0,0,1)]">POKÉMON STADIUM</h1>
        
        <div class="flex flex-col md:flex-row gap-10 mb-10 w-full max-w-5xl">
            <div class="flex-1 bg-blue-900/30 p-6 rounded-[40px] border-4 border-blue-500">
                <input type="text" id="t1-name-input" value="TEAM ALPHA" class="w-full bg-black/60 p-3 rounded-2xl text-center font-black text-xl mb-4 text-white uppercase">
                <div class="grid grid-cols-4 gap-2" id="t1-sprite-grid"></div>
            </div>
            <div class="flex-1 bg-red-900/30 p-6 rounded-[40px] border-4 border-red-500">
                <input type="text" id="t2-name-input" value="TEAM OMEGA" class="w-full bg-black/60 p-3 rounded-2xl text-center font-black text-xl mb-4 text-white uppercase">
                <div class="grid grid-cols-4 gap-2" id="t2-sprite-grid"></div>
            </div>
        </div>
        
        <button onclick="startGame()" class="bg-yellow-500 hover:bg-yellow-400 px-20 py-6 rounded-3xl font-black text-3xl shadow-[0_8px_0_#b45309] active:translate-y-2 active:shadow-none">BATTLE!</button>
    </div>

    <div id="screen-battle" class="hidden flex flex-col pt-24 min-h-screen">
        <div id="battle-global-scores" class="global-score-bar">
            <div class="score-pill"><span id="t1-score-label" class="pixel-font text-[10px]">ALPHA:</span><span id="t1-score-val" class="score-val">0</span></div>
            <div class="score-pill"><span id="t2-score-label" class="pixel-font text-[10px]">OMEGA:</span><span id="t2-score-val" class="score-val">0</span></div>
        </div>

        <div class="split-screen flex-grow">
            <div id="t1-panel" class="team-panel team-1">
                <div class="w-full">
                    <div class="flex justify-between items-end mb-3"><span id="t1-display-name" class="pixel-font text-sm text-blue-300"></span><div id="t1-balls" class="flex gap-2"></div></div>
                    <div class="hp-container"><div id="t1-hp" class="hp-fill"></div></div>
                </div>
                <div class="flex justify-center"><img id="t1-sprite" class="w-48 h-48 object-contain drop-shadow-2xl" src=""></div>
                <div class="space-y-4">
                    <div class="bg-black/85 border-4 border-blue-600 p-6 rounded-[35px] min-h-[100px] flex flex-col items-center justify-center relative">
                        <div id="t1-point-indicator" class="text-[10px] text-yellow-400 pixel-font mb-2">WINS 5 PTS</div>
                        <p id="t1-question" class="text-2xl font-black text-center"></p>
                    </div>
                    <div class="grid gap-4">
                        <button id="t1-opt-0" class="combat-btn t1-color" onclick="handleInput(0, 0)"></button>
                        <button id="t1-opt-1" class="combat-btn t1-color" onclick="handleInput(0, 1)"></button>
                    </div>
                </div>
            </div>

            <div id="t2-panel" class="team-panel team-2">
                <div class="w-full text-right">
                    <div class="flex justify-between items-end mb-3"><div id="t2-balls" class="flex gap-2"></div><span id="t2-display-name" class="pixel-font text-sm text-red-300"></span></div>
                    <div class="hp-container"><div id="t2-hp" class="hp-fill"></div></div>
                </div>
                <div class="flex justify-center"><img id="t2-sprite" class="w-48 h-48 object-contain drop-shadow-2xl" src=""></div>
                <div class="space-y-4">
                    <div class="bg-black/85 border-4 border-red-600 p-6 rounded-[35px] min-h-[100px] flex flex-col items-center justify-center relative">
                        <div id="t2-point-indicator" class="text-[10px] text-yellow-400 pixel-font mb-2">WINS 5 PTS</div>
                        <p id="t2-question" class="text-2xl font-black text-center"></p>
                    </div>
                    <div class="grid gap-4">
                        <button id="t2-opt-0" class="combat-btn t2-color" onclick="handleInput(1, 0)"></button>
                        <button id="t2-opt-1" class="combat-btn t2-color" onclick="handleInput(1, 1)"></button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="level-up-screen" class="fixed inset-0 z-[150] hidden flex flex-col items-center justify-center text-center stadium-bg">
        <h2 id="lvl-title" class="pixel-font text-6xl text-yellow-400 mb-12 drop-shadow-[0_5px_0_rgba(0,0,0,1)]">LEVEL 2</h2>
        <div class="flex gap-20 text-4xl font-black bg-black/80 p-10 rounded-[50px] border-4 border-white/20">
            <div class="text-blue-400"><p id="lvl-t1-name"></p><p id="lvl-t1-score" class="text-6xl">0</p></div>
            <div class="text-red-400"><p id="lvl-t2-name"></p><p id="lvl-t2-score" class="text-6xl">0</p></div>
        </div>
        <p id="lvl-winner-points" class="mt-8 text-2xl text-yellow-300 pixel-font"></p>
    </div>

    <audio id="snd-open" src="https://www.youtube.com/watch?v=EQEVCar9T1I#t=1"></audio> 
    <audio id="snd-correct" src="https://www.youtube.com/watch?v=EQEVCar9T1I#t=51"></audio>
    <audio id="snd-hit" src="https://www.youtube.com/watch?v=EQEVCar9T1I#t=12"></audio>
    <audio id="snd-win" src="https://www.youtube.com/watch?v=EQEVCar9T1I#t=26"></audio>

    <script>
        const POKEMON_LIST = [
            {id: 25, name: 'Pikachu'}, {id: 4, name: 'Charmander'}, {id: 1, name: 'Bulbasaur'}, 
            {id: 7, name: 'Squirtle'}, {id: 133, name: 'Eevee'}, {id: 150, name: 'Mewtwo'},
            {id: 6, name: 'Charizard'}, {id: 143, name: 'Snorlax'}
        ];
        
        let vocab = [
            { q: "Enormous", a: "Giant", w: "Tiny" },
            { q: "Courageous", a: "Brave", w: "Fearful" },
            { q: "Swift", a: "Fast", w: "Slow" },
            { q: "Ancient", a: "Old", w: "New" }
        ];

        let game = {
            level: 0,
            isActive: false,
            points: [5, 10, 20, 30, 40],
            teams: [
                { name: "", sprite: 25, hp: 3, score: 0, currentQ: null },
                { name: "", sprite: 4, hp: 3, score: 0, currentQ: null }
            ]
        };

        function init() {
            const t1Grid = document.getElementById('t1-sprite-grid');
            const t2Grid = document.getElementById('t2-sprite-grid');
            POKEMON_LIST.forEach(pk => {
                t1Grid.appendChild(createImg(pk.id, 0));
                t2Grid.appendChild(createImg(pk.id, 1));
            });
        }

        function createImg(id, teamIdx) {
            const img = document.createElement('img');
            img.src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${id}.png`;
            img.className = `sprite-opt ${game.teams[teamIdx].sprite === id ? 'selected-sprite' : ''}`;
            img.onclick = () => {
                game.teams[teamIdx].sprite = id;
                document.querySelectorAll(`#t${teamIdx+1}-sprite-grid img`).forEach(i => i.classList.remove('selected-sprite'));
                img.classList.add('selected-sprite');
                playSfx('snd-open'); // Play pokeball open sound on selection
            };
            return img;
        }

        function startGame() {
            game.teams[0].name = document.getElementById('t1-name-input').value.toUpperCase();
            game.teams[1].name = document.getElementById('t2-name-input').value.toUpperCase();
            document.getElementById('screen-menu').classList.add('hidden');
            document.getElementById('screen-battle').classList.remove('hidden');
            playSfx('snd-open');
            startRound();
        }

        function startRound() {
            game.isActive = true;
            game.teams.forEach(t => t.hp = 3);
            document.getElementById('t1-display-name').innerText = game.teams[0].name;
            document.getElementById('t2-display-name').innerText = game.teams[1].name;
            document.getElementById('t1-sprite').src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${game.teams[0].sprite}.png`;
            document.getElementById('t2-sprite').src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${game.teams[1].sprite}.png`;
            
            const p = game.points[game.level];
            document.getElementById('t1-point-indicator').innerText = `WINNER GETS ${p} PTS`;
            document.getElementById('t2-point-indicator').innerText = `WINNER GETS ${p} PTS`;

            generateQuestion(0);
            generateQuestion(1);
            updateUI();
        }

        function generateQuestion(idx) {
            const item = vocab[Math.floor(Math.random() * vocab.length)];
            const isCorrectLeft = Math.random() > 0.5;
            game.teams[idx].currentQ = {
                correct: isCorrectLeft ? 0 : 1,
                options: isCorrectLeft ? [item.a, item.w] : [item.w, item.a]
            };
            document.getElementById(`t${idx+1}-question`).innerText = item.q;
            document.getElementById(`t${idx+1}-opt-0`).innerText = game.teams[idx].currentQ.options[0];
            document.getElementById(`t${idx+1}-opt-1`).innerText = game.teams[idx].currentQ.options[1];
        }

        function handleInput(teamIdx, choice) {
            if (!game.isActive) return;
            const team = game.teams[teamIdx];
            const opponentIdx = teamIdx === 0 ? 1 : 0;

            if (choice === team.currentQ.correct) {
                game.teams[opponentIdx].hp--;
                playSfx('snd-correct');
            } else {
                game.teams[teamIdx].hp--;
                playSfx('snd-hit');
            }
            
            if (game.teams[0].hp <= 0 || game.teams[1].hp <= 0) {
                game.isActive = false;
                const winnerIdx = game.teams[0].hp > 0 ? 0 : 1;
                game.teams[winnerIdx].score += game.points[game.level];
                updateUI();
                setTimeout(() => showLevelScreen(winnerIdx), 1000);
            } else {
                generateQuestion(teamIdx);
                updateUI();
            }
        }

        function showLevelScreen(winnerIdx) {
            playSfx('snd-win');
            const screen = document.getElementById('level-up-screen');
            game.level++;
            
            document.getElementById('lvl-title').innerText = `LEVEL ${game.level + 1}`;
            document.getElementById('lvl-t1-name').innerText = game.teams[0].name;
            document.getElementById('lvl-t2-name').innerText = game.teams[1].name;
            document.getElementById('lvl-t1-score').innerText = game.teams[0].score;
            document.getElementById('lvl-t2-score').innerText = game.teams[1].score;
            document.getElementById('lvl-winner-points').innerText = `${game.teams[winnerIdx].name} WON THE ROUND (+${game.points[game.level-1]} PTS!)`;

            screen.classList.remove('hidden');
            setTimeout(() => {
                screen.classList.add('hidden');
                if (game.level < 5) startRound();
                else alert("CHAMPIONSHIP COMPLETE!");
            }, 4000);
        }

        function updateUI() {
            game.teams.forEach((t, i) => {
                document.getElementById(`t${i+1}-hp`).style.width = (t.hp / 3 * 100) + '%';
                const balls = document.getElementById(`t${i+1}-balls`);
                balls.innerHTML = '';
                for(let b=0; b<3; b++) balls.innerHTML += `<img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png" class="w-8 h-8 ${b < t.hp ? '' : 'grayscale opacity-30'}">`;
            });
            document.getElementById('t1-score-val').innerText = game.teams[0].score;
            document.getElementById('t2-score-val').innerText = game.teams[1].score;
        }

        function playSfx(id) {
            const s = document.getElementById(id);
            if(s) { s.currentTime = 0; s.play().catch(()=>{}); }
        }

        init();
    </script>
</body>
</html>
