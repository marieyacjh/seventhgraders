<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Stadium Duel</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Montserrat', sans-serif; }
        
        /* Fixed Background Implementation */
        .stadium-bg {
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), 
                        url('https://wallpapers.com/images/hd/pokemon-stadium-v0m509939q3vclq7.jpg');
            background-size: cover;
            background-position: center;
            height: 100vh;
            width: 100vw;
        }

        .pixel-font { font-family: 'Press Start 2P', cursive; }
        
        .hp-bar-bg { width: 100%; height: 25px; background: #333; border: 3px solid #000; border-radius: 15px; overflow: hidden; }
        .hp-bar-fill { height: 100%; width: 100%; background: #4ade80; transition: width 0.4s ease; }

        .choice-btn {
            background: rgba(0, 0, 0, 0.8);
            border: 3px solid #fff;
            padding: 15px;
            font-size: 1.2rem;
            color: white;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.1s;
            text-transform: uppercase;
            font-weight: 900;
        }
        .choice-btn:active { background: #fff; color: #000; transform: scale(0.98); }

        #top-scoreboard {
            position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 30px; background: rgba(0,0,0,0.85);
            padding: 10px 40px; border-radius: 50px; border: 3px solid #ffde00; z-index: 100;
        }

        .level-card {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #ffde00; color: #000; padding: 40px; border-radius: 20px;
            text-align: center; z-index: 200; display: none; border: 8px solid #000;
        }
    </style>
</head>
<body class="stadium-bg">

    <div id="top-scoreboard" class="hidden">
        <div class="text-blue-400 pixel-font text-[12px]">P1: <span id="s1">0</span></div>
        <div class="text-yellow-400 pixel-font text-[12px]">LVL <span id="curlvl">1</span></div>
        <div class="text-red-400 pixel-font text-[12px]">P2: <span id="s2">0</span></div>
    </div>

    <div id="menu" class="fixed inset-0 flex flex-col items-center justify-center z-50 bg-black/80">
        <h1 class="pixel-font text-4xl text-yellow-400 mb-10 text-center">POKÉMON STADIUM<br><span class="text-xl">VOCAB DUEL</span></h1>
        <div class="flex gap-4">
            <button onclick="startGame()" class="bg-blue-600 text-white px-10 py-5 rounded-xl font-black text-xl shadow-lg">START BATTLE</button>
            <button onclick="toggleEditor(true)" class="bg-gray-600 text-white px-10 py-5 rounded-xl font-black text-xl">EDIT VOCAB</button>
        </div>
    </div>

    <div id="level-overlay" class="level-card">
        <h2 class="pixel-font text-2xl">LEVEL <span id="next-lvl">1</span></h2>
        <p class="font-black text-4xl mt-4">WINNER GETS <span id="next-pts">5</span> POINTS!</p>
    </div>

    <div id="battle-ui" class="hidden h-full grid grid-cols-2">
        <div class="flex flex-col justify-between p-12">
            <div>
                <div class="hp-bar-bg"><div id="p1-hp" class="hp-bar-fill"></div></div>
                <img id="p1-img" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/25.png" class="w-48 h-48 mx-auto mt-4">
            </div>
            <div class="space-y-4">
                <div id="p1-q" class="bg-blue-900/90 p-6 rounded-xl text-center text-2xl font-black border-2 border-white">?</div>
                <div id="p1-btns" class="grid grid-cols-1 gap-2"></div>
            </div>
        </div>

        <div class="flex flex-col justify-between p-12">
            <div>
                <div class="hp-bar-bg"><div id="p2-hp" class="hp-bar-fill"></div></div>
                <img id="p2-img" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/4.png" class="w-48 h-48 mx-auto mt-4">
            </div>
            <div class="space-y-4">
                <div id="p2-q" class="bg-red-900/90 p-6 rounded-xl text-center text-2xl font-black border-2 border-white">?</div>
                <div id="p2-btns" class="grid grid-cols-1 gap-2"></div>
            </div>
        </div>
    </div>

    <div id="editor" class="fixed inset-0 bg-black z-[300] hidden p-10 overflow-y-auto">
        <h2 class="pixel-font text-white mb-6">VOCABULARY EDITOR</h2>
        <div id="vocab-list" class="space-y-2"></div>
        <div class="mt-6 flex gap-4">
            <button onclick="addWord()" class="bg-green-600 p-4 rounded text-white font-bold">+ Add Word</button>
            <button onclick="toggleEditor(false)" class="bg-blue-600 p-4 rounded text-white font-bold">Save & Close</button>
        </div>
    </div>

    <audio id="snd-hit" src="https://play.pokemonshowdown.com/audio/sfx/damage.mp3"></audio>
    <audio id="snd-correct" src="https://play.pokemonshowdown.com/audio/sfx/super-effective.mp3"></audio>
    <audio id="snd-level" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>

    <script>
        let vocab = JSON.parse(localStorage.getItem('stadium_vocab')) || [
            {q: "Enormous", a: "Giant", w: "Small"},
            {q: "Rapid", a: "Fast", w: "Slow"},
            {q: "Ancient", a: "Old", w: "New"}
        ];

        let state = {
            lvl: 1,
            points: {1:5, 2:10, 3:20, 4:30, 5:40},
            p1: {hp: 100, score: 0},
            p2: {hp: 100, score: 0}
        };

        function play(id) { 
            const a = document.getElementById(id);
            a.currentTime = 0; a.play().catch(()=>{}); 
        }

        function toggleEditor(show) {
            document.getElementById('editor').classList.toggle('hidden', !show);
            if(show) renderEditor();
            else localStorage.setItem('stadium_vocab', JSON.stringify(vocab));
        }

        function renderEditor() {
            const container = document.getElementById('vocab-list');
            container.innerHTML = vocab.map((v, i) => `
                <div class="flex gap-2">
                    <input class="p-2 w-1/3" value="${v.q}" onchange="vocab[${i}].q=this.value">
                    <input class="p-2 w-1/3 bg-green-100" value="${v.a}" onchange="vocab[${i}].a=this.value">
                    <input class="p-2 w-1/3 bg-red-100" value="${v.w}" onchange="vocab[${i}].w=this.value">
                    <button onclick="vocab.splice(${i},1);renderEditor()" class="text-red-500 font-bold">X</button>
                </div>
            `).join('');
        }

        function addWord() { vocab.push({q:"", a:"", w:""}); renderEditor(); }

        function startGame() {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('top-scoreboard').classList.remove('hidden');
            document.getElementById('battle-ui').classList.remove('hidden');
            startRound();
        }

        function startRound() {
            if(state.lvl > 5) { alert("Championship Complete!"); location.reload(); return; }
            
            const overlay = document.getElementById('level-overlay');
            document.getElementById('next-lvl').innerText = state.lvl;
            document.getElementById('next-pts').innerText = state.points[state.lvl];
            overlay.style.display = 'block';
            play('snd-level');

            setTimeout(() => {
                overlay.style.display = 'none';
                state.p1.hp = 100; state.p2.hp = 100;
                document.getElementById('curlvl').innerText = state.lvl;
                updateUI();
                genQ(1); genQ(2);
            }, 2000);
        }

        function genQ(pNum) {
            const item = vocab[Math.floor(Math.random() * vocab.length)];
            const isCorrectLeft = Math.random() > 0.5;
            document.getElementById(`p${pNum}-q`).innerText = item.q;
            const btnBox = document.getElementById(`p${pNum}-btns`);
            btnBox.innerHTML = '';
            
            const choices = isCorrectLeft ? [item.a, item.w] : [item.w, item.a];
            choices.forEach(text => {
                const b = document.createElement('button');
                b.className = 'choice-btn';
                b.innerText = text;
                b.onclick = () => handleAns(pNum, text === item.a);
                btnBox.appendChild(b);
            });
        }

        function handleAns(pNum, correct) {
            const opp = pNum === 1 ? 2 : 1;
            if(correct) {
                state[`p${opp}`].hp -= 25;
                play('snd-correct');
            } else {
                state[`p${pNum}`].hp -= 25;
                play('snd-hit');
            }
            updateUI();
            if(state.p1.hp <= 0 || state.p2.hp <= 0) {
                const winNum = state.p1.hp > 0 ? 1 : 2;
                state[`p${winNum}`].score += state.points[state.lvl];
                state.lvl++;
                setTimeout(startRound, 1000);
            } else {
                genQ(pNum);
            }
        }

        function updateUI() {
            document.getElementById('p1-hp').style.width = state.p1.hp + '%';
            document.getElementById('p2-hp').style.width = state.p2.hp + '%';
            document.getElementById('s1').innerText = state.p1.score;
            document.getElementById('s2').innerText = state.p2.score;
        }
    </script>
</body>
</html>
