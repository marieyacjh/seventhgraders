<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Stadium: Vocab Duel</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #000;
            color: white;
            margin: 0;
            overflow: hidden;
        }

        /* Stadium Background from provided link */
        .stadium-bg {
            background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), 
                            url('https://wallpapers.com/images/hd/pokemon-stadium-v0m509939q3vclq7.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh;
        }

        .pixel-font { font-family: 'Press Start 2P', cursive; }

        .hp-bar-bg { width: 100%; height: 20px; background: #333; border: 3px solid #000; border-radius: 10px; }
        .hp-bar-fill { height: 100%; width: 100%; background: #4ade80; transition: width 0.5s ease; }

        .choice-btn {
            background: rgba(0, 0, 0, 0.7);
            border: 4px solid #fff;
            padding: 20px;
            font-size: 1.5rem;
            border-radius: 15px;
            transition: all 0.2s;
        }
        .choice-btn:active { transform: scale(0.95); background: #fff; color: #000; }

        #score-display {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 40px;
            background: rgba(0,0,0,0.8);
            padding: 15px 30px;
            border-radius: 50px;
            border: 2px solid #ffde00;
            z-index: 100;
        }

        .round-announcement {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 222, 0, 0.9);
            color: #000;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            z-index: 200;
            display: none;
            animation: popIn 0.5s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }

        @keyframes popIn { from { transform: translate(-50%, -50%) scale(0); } to { transform: translate(-50%, -50%) scale(1); } }
    </style>
</head>
<body class="stadium-bg">

    <div id="score-display" class="hidden">
        <div class="text-blue-400 pixel-font text-sm">P1: <span id="p1-score-val">0</span></div>
        <div class="text-white pixel-font text-sm">LVL <span id="lvl-val">1</span></div>
        <div class="text-red-400 pixel-font text-sm">P2: <span id="p2-score-val">0</span></div>
    </div>

    <div id="menu" class="fixed inset-0 flex flex-col items-center justify-center z-50 bg-black/70">
        <h1 class="pixel-font text-4xl text-yellow-400 mb-10">POKÉMON DUEL</h1>
        <button onclick="initGame()" class="bg-yellow-500 text-black px-12 py-6 rounded-full font-black text-2xl hover:bg-yellow-400 transition-all">
            START BATTLE
        </button>
        <p class="mt-4 text-gray-400">Ensure volume is up for sound effects!</p>
    </div>

    <div id="round-overlay" class="round-announcement">
        <h2 class="pixel-font text-2xl mb-4">ROUND <span id="overlay-lvl">1</span></h2>
        <p class="font-black text-4xl">WINNER GETS <span id="overlay-pts">5</span> POINTS!</p>
    </div>

    <div id="battle-field" class="hidden h-full grid grid-cols-2">
        <div class="flex flex-col justify-between p-10 border-r-2 border-white/20">
            <div>
                <h3 id="p1-name" class="pixel-font text-blue-400 mb-2">PLAYER 1</h3>
                <div class="hp-bar-bg"><div id="p1-hp" class="hp-bar-fill"></div></div>
            </div>
            <div class="flex justify-center">
                <img id="p1-img" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/25.png" class="w-64 h-64 object-contain">
            </div>
            <div class="space-y-4">
                <div class="bg-blue-900/80 p-6 rounded-2xl text-center text-2xl font-black" id="p1-q">QUESTION</div>
                <div class="grid grid-cols-1 gap-4" id="p1-btns"></div>
            </div>
        </div>

        <div class="flex flex-col justify-between p-10">
            <div class="text-right">
                <h3 id="p2-name" class="pixel-font text-red-400 mb-2">PLAYER 2</h3>
                <div class="hp-bar-bg"><div id="p2-hp" class="hp-bar-fill"></div></div>
            </div>
            <div class="flex justify-center">
                <img id="p2-img" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/4.png" class="w-64 h-64 object-contain">
            </div>
            <div class="space-y-4">
                <div class="bg-red-900/80 p-6 rounded-2xl text-center text-2xl font-black" id="p2-q">QUESTION</div>
                <div class="grid grid-cols-1 gap-4" id="p2-btns"></div>
            </div>
        </div>
    </div>

    <audio id="sfx-start" src="https://www.myinstants.com/media/sounds/pokemon-stadium-announcer-battle-begin.mp3"></audio>
    <audio id="sfx-correct" src="https://play.pokemonshowdown.com/audio/sfx/super-effective.mp3"></audio>
    <audio id="sfx-hit" src="https://play.pokemonshowdown.com/audio/sfx/damage.mp3"></audio>
    <audio id="sfx-level" src="https://www.myinstants.com/media/sounds/level-up-pokemon.mp3"></audio>

    <script>
        const gameData = {
            level: 1,
            pointsPerLevel: { 1: 5, 2: 10, 3: 20, 4: 30, 5: 40 },
            p1: { score: 0, hp: 100 },
            p2: { score: 0, hp: 100 },
            vocab: [
                { q: "Small", a: "Tiny", w: "Huge" },
                { q: "Fast", a: "Quick", w: "Slow" },
                { q: "Happy", a: "Glad", w: "Sad" },
                { q: "Cold", a: "Chilly", w: "Hot" }
            ]
        };

        function playSfx(id) {
            const audio = document.getElementById(id);
            audio.currentTime = 0;
            audio.play().catch(() => console.log("Audio waiting for user interaction"));
        }

        function initGame() {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('score-display').classList.remove('hidden');
            document.getElementById('battle-field').classList.remove('hidden');
            startNewRound();
        }

        function startNewRound() {
            if (gameData.level > 5) {
                alert("Game Over! Finals: P1: " + gameData.p1.score + " P2: " + gameData.p2.score);
                location.reload();
                return;
            }

            // Show Round Announcement
            const overlay = document.getElementById('round-overlay');
            document.getElementById('overlay-lvl').innerText = gameData.level;
            document.getElementById('overlay-pts').innerText = gameData.pointsPerLevel[gameData.level];
            overlay.style.display = 'block';
            playSfx('sfx-start');

            setTimeout(() => {
                overlay.style.display = 'none';
                gameData.p1.hp = 100;
                gameData.p2.hp = 100;
                updateHP();
                nextQuestion(1);
                nextQuestion(2);
            }, 2500);
        }

        function nextQuestion(playerNum) {
            const item = gameData.vocab[Math.floor(Math.random() * gameData.vocab.length)];
            const isCorrectA = Math.random() > 0.5;
            const qEl = document.getElementById(`p${playerNum}-q`);
            const btnEl = document.getElementById(`p${playerNum}-btns`);
            
            qEl.innerText = item.q;
            btnEl.innerHTML = '';

            const options = isCorrectA ? [item.a, item.w] : [item.w, item.a];
            options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(playerNum, opt === item.a);
                btnEl.appendChild(btn);
            });
        }

        function checkAnswer(playerNum, isCorrect) {
            const opponent = playerNum === 1 ? 2 : 1;
            if (isCorrect) {
                gameData[`p${opponent}`].hp -= 25;
                playSfx('sfx-correct');
            } else {
                gameData[`p${playerNum}`].hp -= 25;
                playSfx('sfx-hit');
            }

            updateHP();

            if (gameData.p1.hp <= 0 || gameData.p2.hp <= 0) {
                const winner = gameData.p1.hp > 0 ? 1 : 2;
                handleRoundWin(winner);
            } else {
                nextQuestion(playerNum);
            }
        }

        function handleRoundWin(winnerNum) {
            const pts = gameData.pointsPerLevel[gameData.level];
            gameData[`p${winnerNum}`].score += pts;
            gameData.level++;
            
            document.getElementById('p1-score-val').innerText = gameData.p1.score;
            document.getElementById('p2-score-val').innerText = gameData.p2.score;
            document.getElementById('lvl-val').innerText = gameData.level > 5 ? 5 : gameData.level;
            
            playSfx('sfx-level');
            setTimeout(startNewRound, 1500);
        }

        function updateHP() {
            document.getElementById('p1-hp').style.width = gameData.p1.hp + '%';
            document.getElementById('p2-hp').style.width = gameData.p2.hp + '%';
        }
    </script>
</body>
</html>
