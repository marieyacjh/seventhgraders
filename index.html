<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Duel: Space Stadium Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Press+Start+2P&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --pk-blue: #3b4cca;
            --pk-red: #ff0000;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #000;
            color: white;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }

        .pixel-font { font-family: 'Press Start 2P', cursive; }

        /* Space Stadium Background using provided image */
        .stadium-bg {
            background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), 
                            url('https://i.imgur.com/k6K4K2X.png'); /* Note: Update to proper image_0.png URL if needed. Imgur link as placeholder for standard logic */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .split-screen {
            display: grid;
            grid-template-columns: 1fr 1fr;
            height: 100vh;
            width: 100vw;
        }

        .team-panel {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2rem;
            transition: background 0.3s ease;
        }

        .team-1 { border-right: 6px solid rgba(0,0,0,0.5); background: rgba(59, 76, 202, 0.25); }
        .team-2 { background: rgba(255, 0, 0, 0.25); }

        /* HP Bars */
        .hp-container {
            width: 100%;
            height: 24px;
            background: #333;
            border: 4px solid #000;
            border-radius: 12px;
            overflow: hidden;
        }
        .hp-fill {
            height: 100%;
            width: 100%;
            background: #4ade80;
            transition: width 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }

        /* Large Touch-Friendly Buttons */
        .combat-btn {
            width: 100%;
            padding: 2.5rem 1rem;
            border-radius: 24px;
            border: 6px solid rgba(255,255,255,0.3);
            font-weight: 900;
            text-transform: uppercase;
            font-size: 1.8rem;
            box-shadow: 0 10px 0 rgba(0,0,0,0.4);
            transition: all 0.1s;
        }
        .combat-btn:active { transform: translateY(6px); box-shadow: none; }
        .t1-color { background: linear-gradient(145deg, #3b4cca, #2a3891); }
        .t2-color { background: linear-gradient(145deg, #ff0000, #b30000); }

        /* Animation Overlays */
        #level-up-screen {
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .nav-pill {
            background: white;
            color: #000;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            z-index: 200;
        }

        .sprite-opt {
            cursor: pointer;
            transition: 0.2s;
            border: 5px solid transparent;
            border-radius: 20px;
        }
        .selected-sprite { border-color: #ffde00; background: rgba(255,222,0,0.3); }

        /* Global Scores Display above battle panels */
        .global-score-bar {
            position: fixed;
            top: 60px; /* Adjusted to fit below navigation */
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            z-index: 100;
        }
        .score-pill {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid white;
            padding: 8px 20px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .score-val {
            color: #ffde00;
            font-weight: 900;
            font-size: 1.2rem;
        }
    </style>
</head>
<body class="stadium-bg">

    <div class="fixed top-6 left-1/2 -translate-x-1/2 flex gap-6 z-[200]">
        <div class="nav-pill pixel-font" onclick="location.reload()">HOME</div>
        <div class="nav-pill pixel-font" id="back-btn" onclick="location.reload()" style="display:none;">BACK</div>
    </div>

    <div id="screen-menu" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-slate-950/90 overflow-y-auto p-10">
        <h1 class="pixel-font text-5xl md:text-6xl text-yellow-400 mb-10 text-center drop-shadow-[0_6px_0_rgba(0,0,0,1)]">
            POKÉMON DUEL
        </h1>

        <div class="flex flex-col md:flex-row gap-10 mb-14 w-full max-w-6xl">
            <div class="flex-1 bg-blue-900/30 p-8 rounded-[40px] border-4 border-blue-500 shadow-2xl">
                <input type="text" id="t1-name-input" value="TEAM ALPHA" class="w-full bg-black/60 p-4 rounded-2xl text-center font-black text-2xl mb-6 border-2 border-blue-400 text-white uppercase tracking-wider">
                <p class="text-sm text-blue-200 mb-4 text-center font-black uppercase tracking-tighter">SELECT YOUR FIGHTER</p>
                <div class="grid grid-cols-4 gap-3" id="t1-sprite-grid"></div>
            </div>

            <div class="flex-1 bg-red-900/30 p-8 rounded-[40px] border-4 border-red-500 shadow-2xl">
                <input type="text" id="t2-name-input" value="TEAM OMEGA" class="w-full bg-black/60 p-4 rounded-2xl text-center font-black text-2xl mb-6 border-2 border-red-400 text-white uppercase tracking-wider">
                <p class="text-sm text-red-200 mb-4 text-center font-black uppercase tracking-tighter">SELECT YOUR FIGHTER</p>
                <div class="grid grid-cols-4 gap-3" id="t2-sprite-grid"></div>
            </div>
        </div>
        
        <div class="flex flex-col gap-6 w-80">
            <button onclick="startGame()" class="bg-yellow-500 hover:bg-yellow-400 text-blue-950 py-6 rounded-3xl font-black text-3xl shadow-[0_8px_0_#b45309] active:translate-y-2 active:shadow-none transition-all">BATTLE!</button>
            <button onclick="toggleEditor(true)" class="text-gray-400 font-bold text-sm tracking-widest hover:text-white underline">STADIUM SETTINGS</button>
        </div>
    </div>

    <div id="screen-battle" class="hidden flex flex-col pt-24 stadium-bg"> <div id="battle-global-scores" class="global-score-bar hidden">
            <div class="score-pill">
                <span id="t1-score-label" class="pixel-font text-[10px]">ALPHA:</span>
                <span id="t1-score-val" class="score-val">0</span>
            </div>
            <div class="score-pill">
                <span id="t2-score-label" class="pixel-font text-[10px]">OMEGA:</span>
                <span id="t2-score-val" class="score-val">0</span>
            </div>
        </div>

        <div class="split-screen flex-grow">
            <div id="t1-panel" class="team-panel team-1">
                <div class="w-full">
                    <div class="flex justify-between items-end mb-3">
                        <span id="t1-display-name" class="pixel-font text-sm text-blue-300"></span>
                        <div id="t1-balls" class="flex gap-2"></div>
                    </div>
                    <div class="hp-container"><div id="t1-hp" class="hp-fill"></div></div>
                </div>

                <div class="flex justify-center py-6"><img id="t1-sprite" class="w-64 h-64 object-contain drop-shadow-2xl" src=""></div>

                <div class="space-y-6">
                    <div class="bg-black/85 border-4 border-blue-600 p-8 rounded-[35px] min-h-[140px] flex items-center justify-center shadow-inner relative">
                        <div id="t1-point-indicator" class="absolute top-2 right-4 text-[10px] text-yellow-400 pixel-font hidden">WINS 5 PTS</div>
                        <p id="t1-question" class="text-3xl font-black text-center"></p>
                    </div>
                    <div class="grid gap-5">
                        <button id="t1-opt-0" class="combat-btn t1-color" onclick="handleInput(0, 0)"></button>
                        <button id="t1-opt-1" class="combat-btn t1-color" onclick="handleInput(0, 1)"></button>
                    </div>
                </div>
            </div>

            <div id="t2-panel" class="team-panel team-2">
                <div class="w-full text-right">
                    <div class="flex justify-between items-end mb-3">
                        <div id="t2-balls" class="flex gap-2"></div>
                        <span id="t2-display-name" class="pixel-font text-sm text-red-300"></span>
                    </div>
                    <div class="hp-container"><div id="t2-hp" class="hp-fill"></div></div>
                </div>

                <div class="flex justify-center py-6"><img id="t2-sprite" class="w-64 h-64 object-contain drop-shadow-2xl" src=""></div>

                <div class="space-y-6">
                    <div class="bg-black/85 border-4 border-red-600 p-8 rounded-[35px] min-h-[140px] flex items-center justify-center shadow-inner relative">
                        <div id="t2-point-indicator" class="absolute top-2 left-4 text-[10px] text-yellow-400 pixel-font hidden">WINS 5 PTS</div>
                        <p id="t2-question" class="text-3xl font-black text-center"></p>
                    </div>
                    <div class="grid gap-5">
                        <button id="t2-opt-0" class="combat-btn t2-color" onclick="handleInput(1, 0)"></button>
                        <button id="t2-opt-1" class="combat-btn t2-color" onclick="handleInput(1, 1)"></button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="level-up-screen" class="fixed inset-0 z-[150] hidden flex flex-col items-center justify-center text-center stadium-bg">
        <h2 id="lvl-title" class="pixel-font text-6xl text-yellow-400 mb-12 drop-shadow-[0_5px_0_rgba(0,0,0,1)]">LEVEL 2</h2>
        <div class="flex gap-32 text-4xl font-black bg-black/60 p-12 rounded-[50px] border-4 border-white/20 backdrop-blur-md">
            <div class="text-blue-400">
                <p id="lvl-t1-name" class="uppercase tracking-widest"></p>
                <p id="lvl-t1-score" class="text-7xl mt-4 drop-shadow-lg">0</p>
                <p class="text-sm mt-2 text-white/50">PTS</p>
            </div>
            <div class="text-red-400">
                <p id="lvl-t2-name" class="uppercase tracking-widest"></p>
                <p id="lvl-t2-score" class="text-7xl mt-4 drop-shadow-lg">0</p>
                <p class="text-sm mt-2 text-white/50">PTS</p>
            </div>
        </div>
        <p id="lvl-winner-points" class="mt-8 text-2xl text-yellow-300 pixel-font hidden"></p>
        <p class="mt-8 text-white pixel-font text-xl animate-pulse">PREPARE FOR NEXT ROUND!</p>
    </div>

    <div id="screen-editor" class="fixed inset-0 z-[300] hidden bg-slate-950 p-10 overflow-y-auto">
        <div class="max-w-5xl mx-auto">
            <div class="flex justify-between items-center mb-8">
                <h2 class="pixel-font text-2xl text-yellow-400">STADIUM VOCABULARY</h2>
                <button onclick="toggleEditor(false)" class="bg-red-600 px-6 py-2 rounded-xl font-bold">CLOSE</button>
            </div>
            <div id="vocab-rows" class="space-y-4"></div>
            <div class="mt-10 flex gap-6">
                <button onclick="addRow()" class="bg-blue-600 px-10 py-4 rounded-2xl font-bold text-xl">+ ADD WORD PAIR</button>
                <button onclick="saveAndClose()" class="bg-green-600 px-10 py-4 rounded-2xl font-bold text-xl">SAVE DATA</button>
            </div>
        </div>
    </div>

    <audio id="snd-battle" loop src="https://www.soundboard.com/handler/DownLoadTrack.ashx?cliptoken=8f27806a-0466-410a-810d-8547379d727b"></audio>
    <audio id="snd-correct" src="https://play.pokemonshowdown.com/audio/sfx/super-effective.mp3"></audio>
    <audio id="snd-hit" src="https://play.pokemonshowdown.com/audio/sfx/damage.mp3"></audio>
    <audio id="snd-faint" src="https://play.pokemonshowdown.com/audio/sfx/faint.mp3"></audio>
    <audio id="snd-level-up" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio> <script>
        const POKEMON_LIST = [
            {id: 25, name: 'Pikachu'}, {id: 4, name: 'Charmander'}, {id: 1, name: 'Bulbasaur'}, 
            {id: 7, name: 'Squirtle'}, {id: 133, name: 'Eevee'}, {id: 150, name: 'Mewtwo'},
            {id: 94, name: 'Gengar'}, {id: 39, name: 'Jigglypuff'}, {id: 143, name: 'Snorlax'},
            {id: 6, name: 'Charizard'}, {id: 151, name: 'Mew'}, {id: 52, name: 'Meowth'}
        ];
        
        let vocab = JSON.parse(localStorage.getItem('pkmn_sim_vocab')) || [
            { q: "Enormous", a: "Giant", w: "Tiny" },
            { q: "Courageous", a: "Brave", w: "Fearful" },
            { q: "Swift", a: "Fast", w: "Slow" },
            { q: "Transparent", a: "Clear", w: "Solid" },
            { q: "Ancient", a: "Old", w: "New" }
        ];

        let game = {
            level: 0,
            isActive: false,
            points: [5, 10, 20, 30, 40], // Point values for winners of each round L1 to L5
            teams: [
                { name: "", sprite: 25, hp: 3, score: 0, currentQ: null },
                { name: "", sprite: 4, hp: 3, score: 0, currentQ: null }
            ]
        };

        function initSetup() {
            const t1Grid = document.getElementById('t1-sprite-grid');
            const t2Grid = document.getElementById('t2-sprite-grid');
            
            POKEMON_LIST.forEach(pk => {
                t1Grid.appendChild(createImg(pk.id, 0));
                t2Grid.appendChild(createImg(pk.id, 1));
            });
            renderRows();
        }

        function createImg(id, teamIdx) {
            const img = document.createElement('img');
            img.src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${id}.png`;
            img.className = `sprite-opt p-2 ${game.teams[teamIdx].sprite === id ? 'selected-sprite' : ''}`;
            img.onclick = () => {
                game.teams[teamIdx].sprite = id;
                document.querySelectorAll(`#t${teamIdx+1}-sprite-grid img`).forEach(i => i.classList.remove('selected-sprite'));
                img.classList.add('selected-sprite');
            };
            return img;
        }

        function startGame() {
            game.teams[0].name = document.getElementById('t1-name-input').value.toUpperCase() || "ALPHA";
            game.teams[1].name = document.getElementById('t2-name-input').value.toUpperCase() || "OMEGA";
            
            // Set labels in score bar
            document.getElementById('t1-score-label').innerText = game.teams[0].name.slice(0, 5) + ':'; // Truncate to save space if needed
            document.getElementById('t2-score-label').innerText = game.teams[1].name.slice(0, 5) + ':';

            document.getElementById('screen-menu').classList.add('hidden');
            document.getElementById('screen-battle').classList.remove('hidden');
            document.getElementById('battle-global-scores').classList.remove('hidden');
            document.getElementById('back-btn').style.display = 'block';
            
            game.level = 0;
            game.teams[0].score = 0;
            game.teams[1].score = 0;
            
            startRound();
            document.getElementById('snd-battle').play().catch(() => {});
        }

        function startRound() {
            game.isActive = true;
            game.teams.forEach(t => { t.hp = 3; });
            
            document.getElementById('t1-display-name').innerText = game.teams[0].name;
            document.getElementById('t2-display-name').innerText = game.teams[1].name;
            document.getElementById('t1-sprite').src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${game.teams[0].sprite}.png`;
            document.getElementById('t2-sprite').src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${game.teams[1].sprite}.png`;
            
            // Show round points on indicators
            document.getElementById('t1-point-indicator').innerText = `WINS ${game.points[game.level]} PTS`;
            document.getElementById('t1-point-indicator').classList.remove('hidden');
            document.getElementById('t2-point-indicator').innerText = `WINS ${game.points[game.level]} PTS`;
            document.getElementById('t2-point-indicator').classList.remove('hidden');

            generateQuestion(0);
            generateQuestion(1);
            updateUI();
        }

        function generateQuestion(idx) {
            if (vocab.length === 0) {
                document.getElementById(`t${idx+1}-question`).innerText = "ERR: NO WORDS";
                return;
            }
            const item = vocab[Math.floor(Math.random() * vocab.length)];
            const isCorrectLeft = Math.random() > 0.5;
            game.teams[idx].currentQ = {
                correct: isCorrectLeft ? 0 : 1,
                options: isCorrectLeft ? [item.a, item.w] : [item.w, item.a]
            };
            document.getElementById(`t${idx+1}-question`).innerText = item.q;
            document.getElementById(`t${idx+1}-opt-0`).innerText = game.teams[idx].currentQ.options[0];
            document.getElementById(`t${idx+1}-opt-1`).innerText = game.teams[idx].currentQ.options[1];
        }

        function handleInput(teamIdx, choice) {
            if (!game.isActive) return;
            const team = game.teams[teamIdx];
            const opponentIdx = teamIdx === 0 ? 1 : 0;

            if (choice === team.currentQ.correct) {
                // Correct answer hits opponent
                game.teams[opponentIdx].hp--;
                playSfx('correct');
                flashDamage(opponentIdx);
            } else {
                // Wrong answer hits self
                game.teams[teamIdx].hp--;
                playSfx('hit');
                flashDamage(teamIdx);
            }
            
            if (game.teams[0].hp <= 0 || game.teams[1].hp <= 0) {
                game.isActive = false;
                const winnerIdx = game.teams[0].hp > 0 ? 0 : 1;
                const pointsGained = game.points[game.level];
                game.teams[winnerIdx].score += pointsGained;
                playSfx('faint');
                updateUI(); // Show 0 hp and updated global scores before transition
                
                setTimeout(() => showLevelEffect(winnerIdx, pointsGained), 1000); // delay before transition
            } else {
                generateQuestion(teamIdx);
                updateUI();
            }
        }

        function showLevelEffect(winnerIdx, pointsGained) {
            game.level++;
            const screen = document.getElementById('level-up-screen');
            playSfx('level-up');
            
            if (game.level >= 5) {
                // Championship summary before home
                const finalWinner = game.teams[0].score > game.teams[1].score ? game.teams[0] : game.teams[1];
                document.getElementById('lvl-title').innerText = `🏆 CHAMPIONSHIP OVER! 🏆`;
                document.getElementById('lvl-winner-points').innerText = `${finalWinner.name} IS THE CHAMPION!\nTotal: ${finalWinner.score} PTS`;
                document.getElementById('lvl-winner-points').classList.remove('hidden');
                document.getElementById('lvl-t1-name').innerText = game.teams[0].name;
                document.getElementById('lvl-t2-name').innerText = game.teams[1].name;
                document.getElementById('lvl-t1-score').innerText = game.teams[0].score;
                document.getElementById('lvl-t2-score').innerText = game.teams[1].score;
                
                screen.classList.remove('hidden');
                // No auto-hide, let teacher click HOME
                return;
            }

            document.getElementById('lvl-title').innerText = `LEVEL ${game.level + 1}`;
            // Show round winner details
            document.getElementById('lvl-winner-points').innerText = `${game.teams[winnerIdx].name} GENTLY GAINS ${pointsGained} PTS!`;
            document.getElementById('lvl-winner-points').classList.remove('hidden');

            document.getElementById('lvl-t1-name').innerText = game.teams[0].name;
            document.getElementById('lvl-t2-name').innerText = game.teams[1].name;
            document.getElementById('lvl-t1-score').innerText = game.teams[0].score;
            document.getElementById('lvl-t2-score').innerText = game.teams[1].score;
            
            screen.classList.remove('hidden');
            setTimeout(() => {
                screen.classList.add('hidden');
                document.getElementById('lvl-winner-points').classList.add('hidden'); // hide for next time
                startRound();
            }, 3500); // longer show for scores
        }

        function updateUI() {
            // Update HPs and Balls
            game.teams.forEach((t, i) => {
                const maxHp = 3;
                let hpShow = t.hp < 0 ? 0 : t.hp; // don't show negative hp
                const pct = (hpShow / maxHp) * 100;
                document.getElementById(`t${i+1}-hp`).style.width = pct + '%';
                
                // Set color
                const hpBar = document.getElementById(`t${i+1}-hp`);
                hpBar.className = 'hp-fill'; // reset
                if (pct <= 66) hpBar.classList.add('bg-yellow-400');
                if (pct <= 33) hpBar.classList.add('bg-red-500');

                const balls = document.getElementById(`t${i+1}-balls`);
                balls.innerHTML = '';
                for(let b=0; b<maxHp; b++) {
                    const op = b < hpShow ? 'opacity-100' : 'opacity-20';
                    balls.innerHTML += `<img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png" class="w-10 h-10 ${op}">`;
                }
                
                // Grey out sprite if fainted
                const sprite = document.getElementById(`t${i+1}-sprite`);
                sprite.className = "w-64 h-64 object-contain drop-shadow-2xl transition-all";
                if (t.hp <= 0) sprite.classList.add('grayscale', 'opacity-50');
            });

            // Update Global Scores Bar
            document.getElementById('t1-score-val').innerText = game.teams[0].score;
            document.getElementById('t2-score-val').innerText = game.teams[1].score;
        }

        function flashDamage(teamIdx) {
            const panel = document.getElementById(`t${teamIdx+1}-panel`);
            panel.classList.add('animate-pulse', 'border-red-600', 'border-8'); // temporary highlight
            setTimeout(() => panel.classList.remove('animate-pulse', 'border-red-600', 'border-8'), 500);
        }

        // Editor Functions
        function toggleEditor(s) { document.getElementById('screen-editor').classList.toggle('hidden', !s); }
        function renderRows() {
            const c = document.getElementById('vocab-rows'); c.innerHTML = '';
            vocab.forEach((it, i) => {
                c.innerHTML += `<div class="grid grid-cols-12 gap-3 bg-slate-900/50 p-4 rounded-2xl border border-white/10">
                    <input class="col-span-5 p-3 bg-black rounded-xl text-white" value="${it.q}" onchange="vocab[${i}].q=this.value">
                    <input class="col-span-3 p-3 bg-green-950/50 text-green-400 rounded-xl border border-green-900" value="${it.a}" onchange="vocab[${i}].a=this.value">
                    <input class="col-span-3 p-3 bg-red-950/50 text-red-400 rounded-xl border border-red-900" value="${it.w}" onchange="vocab[${i}].w=this.value">
                    <button onclick="vocab.splice(${i},1);renderRows()" class="text-red-500 font-bold text-xl">✕</button>
                </div>`;
            });
        }
        function addRow() { vocab.push({q:"",a:"",w:""}); renderRows(); }
        function saveAndClose() { localStorage.setItem('pkmn_sim_vocab', JSON.stringify(vocab)); toggleEditor(false); }

        function playSfx(id) {
            const s = document.getElementById(`snd-${id}`);
            s.currentTime = 0;
            s.play().catch(e=>console.log("Audio play blocked", e));
        }

        // Add sound loading to menu interaction to enable them later if blocked
        document.body.addEventListener('click', () => {
            // Unmute logic if needed on first click, for simple setups standard browser logic applies.
        }, { once: true });

        initSetup();
    </script>
</body>
</html>
